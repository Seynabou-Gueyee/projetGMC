<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients principaux conformes au thème -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="120%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#7a68d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient radial pour brillance réaliste -->
    <radialGradient id="innerLight" cx="40%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.65" />
      <stop offset="35%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>

    <!-- Gradient pour ombre interne -->
    <radialGradient id="innerShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </radialGradient>

    <!-- Filtre d'ombre réaliste profonde -->
    <filter id="deepShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.32"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filtre de glow subtil -->
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>

    <!-- Filtre de profondeur douce -->
    <filter id="depthEffect">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cercle de fond avec ombre dramatique -->
  <circle cx="100" cy="100" r="99" fill="url(#bgGradient)" filter="url(#deepShadow)"/>
  
  <!-- Ombre interne pour profondeur 3D -->
  <circle cx="100" cy="100" r="96" fill="url(#innerShadow)"/>
  
  <!-- Brillance supérieure réaliste -->
  <circle cx="100" cy="100" r="96" fill="url(#innerLight)"/>

  <!-- Design principal: Icône de message moderne et élégante -->
  
  <!-- Bulle de message principale (arrond moderne) -->
  <g filter="url(#depthEffect)">
    <!-- Ombre de la bulle -->
    <path d="M 38 62 Q 38 45 58 45 L 110 45 Q 125 45 125 60 L 125 82 Q 125 97 110 97 L 60 97 L 45 112 Q 50 104 60 97 Q 38 97 38 82 Z" 
          fill="#000000" opacity="0.18" transform="translate(1, 3)"/>
    
    <!-- Corps principal du message -->
    <path d="M 38 62 Q 38 45 58 45 L 110 45 Q 125 45 125 60 L 125 82 Q 125 97 110 97 L 60 97 L 45 112 Q 50 104 60 97 Q 38 97 38 82 Z" 
          fill="#ffffff" opacity="0.975" style="mix-blend-mode: normal"/>
    
    <!-- Reflet interne subtil -->
    <path d="M 38 62 Q 38 45 58 45 L 110 45 Q 125 45 125 60 L 125 82 Q 125 97 110 97 L 60 97 L 45 112 Q 50 104 60 97 Q 38 97 38 82 Z" 
          fill="url(#innerLight)" opacity="0.35"/>
  </g>

  <!-- Contenu du message - Linéatures texte réalistes -->
  <g opacity="0.9">
    <!-- Première ligne -->
    <rect x="52" y="57" width="25" height="3" rx="1.5" fill="#667eea"/>
    
    <!-- Deuxième ligne (plus longue) -->
    <rect x="52" y="66" width="55" height="3" rx="1.5" fill="#667eea" opacity="0.85"/>
    
    <!-- Troisième ligne (moyenne) -->
    <rect x="52" y="75" width="45" height="2.5" rx="1.25" fill="#667eea" opacity="0.65"/>
  </g>

  <!-- Deuxième bulle de message (réponse) -->
  <g filter="url(#depthEffect)">
    <!-- Ombre -->
    <path d="M 75 105 Q 75 120 92 120 L 155 120 Q 170 120 170 105 L 170 88 Q 170 73 155 73 L 115 73 L 150 60 Q 145 73 115 73 Q 75 73 75 88 Z" 
          fill="#000000" opacity="0.14" transform="translate(1, 3)"/>
    
    <!-- Corps -->
    <path d="M 75 105 Q 75 120 92 120 L 155 120 Q 170 120 170 105 L 170 88 Q 170 73 155 73 L 115 73 L 150 60 Q 145 73 115 73 Q 75 73 75 88 Z" 
          fill="#ffffff" opacity="0.96" style="mix-blend-mode: normal"/>
    
    <!-- Reflet -->
    <path d="M 75 105 Q 75 120 92 120 L 155 120 Q 170 120 170 105 L 170 88 Q 170 73 155 73 L 115 73 L 150 60 Q 145 73 115 73 Q 75 73 75 88 Z" 
          fill="url(#innerLight)" opacity="0.28"/>
  </g>

  <!-- Contenu deuxième bulle -->
  <g opacity="0.88">
    <!-- Première ligne -->
    <rect x="88" y="82" width="45" height="3" rx="1.5" fill="#764ba2"/>
    
    <!-- Deuxième ligne (courte) -->
    <rect x="88" y="91" width="32" height="3" rx="1.5" fill="#764ba2" opacity="0.8"/>
    
    <!-- Troisième ligne (très courte) -->
    <rect x="88" y="100" width="18" height="2.5" rx="1.25" fill="#764ba2" opacity="0.6"/>
  </g>

  <!-- Ligne de connexion subtile entre les bulles -->
  <g opacity="0.2">
    <path d="M 125 80 Q 140 92 155 100" 
          stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Détail bas: Petits points d'animation -->
  <g opacity="0.5">
    <circle cx="82" cy="152" r="2.5" fill="#ffffff"/>
    <circle cx="100" cy="157" r="2" fill="#ffffff"/>
    <circle cx="118" cy="153" r="2.5" fill="#ffffff"/>
  </g>

  <!-- Reflet supérieur brillant (style iOS/premium) -->
  <ellipse cx="68" cy="58" rx="26" ry="19" fill="#ffffff" opacity="0.4" style="mix-blend-mode: screen"/>
  
  <!-- Reflet secondaire discret -->
  <ellipse cx="135" cy="95" rx="20" ry="14" fill="#ffffff" opacity="0.15" style="mix-blend-mode: overlay"/>

  <!-- Bordure externe subtile pour définition nette -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Bordure interne pour effet de profondeur -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#000000" stroke-width="0.3" opacity="0.08"/>
</svg>